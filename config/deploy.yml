service: lens_pay
image: toan-au/lens-pay

servers:
  web:
    - 159.223.59.162

# Kamal proxy handles TLS termination via Let's Encrypt and zero-downtime deploys.
# Set encryption mode to "Full" in Cloudflare if using CF in front.
proxy:
  ssl: true
  host: lenspay.toanau.com

registry:
  server: ghcr.io
  username: toan-au # Your GitHub username
  password:
    - KAMAL_REGISTRY_PASSWORD # GitHub personal access token with packages:write scope

env:
  secret:
    - RAILS_MASTER_KEY
    - LENS_PAY_DATABASE_PASSWORD
  clear:
    # Runs Solid Queue inside the Puma process — fine for a single server.
    # Split into a dedicated job host when you need to scale.
    SOLID_QUEUE_IN_PUMA: true
    # Connects to the PostgreSQL accessory container via Docker's internal network.
    DB_HOST: lens_pay-db
    APP_HOST: lenspay.toanau.com

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"


builder:
  arch: amd64

# PostgreSQL runs as a managed container on the same server.
# Data is persisted to a named volume so it survives container restarts.
# Only accessible on localhost — not exposed to the internet.
accessories:
  db:
    image: postgres:17
    host: 159.223.59.162
    port: "127.0.0.1:5432:5432"
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: lens_pay
        POSTGRES_DB: lens_pay_production
    directories:
      - data:/var/lib/postgresql/data
