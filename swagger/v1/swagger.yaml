---
openapi: 3.0.1
info:
  title: LensPay API
  version: v1
  description: Payment processing API for LensPay
paths:
  "/api/v1/customers":
    post:
      summary: Create a customer
      tags:
      - Customers
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: customer created
        '422':
          description: validation failed
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  example: jane@example.com
                metadata:
                  type: object
                  example:
                    tier: gold
                  description: Arbitrary key-value data
              required:
              - name
              - email
    get:
      summary: List customers
      tags:
      - Customers
      security:
      - bearer_auth: []
      parameters:
      - name: cursor
        in: query
        required: false
        description: Pagination cursor (uid of last customer in previous page)
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Number of results per page (default: 25)'
        schema:
          type: integer
      responses:
        '200':
          description: customers listed
        '401':
          description: unauthorized
  "/api/v1/customers/{uid}":
    parameters:
    - name: uid
      in: path
      description: Customer UID
      example: cus_abc123
      required: true
      schema:
        type: string
    get:
      summary: Fetch a customer
      tags:
      - Customers
      security:
      - bearer_auth: []
      responses:
        '200':
          description: customer found
        '404':
          description: customer not found
        '401':
          description: unauthorized
    patch:
      summary: Update a customer
      tags:
      - Customers
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: customer updated
        '422':
          description: validation failed
        '404':
          description: customer not found
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Jane Smith
                email:
                  type: string
                  example: jane.smith@example.com
                metadata:
                  type: object
                  example:
                    tier: platinum
    delete:
      summary: Delete a customer
      tags:
      - Customers
      security:
      - bearer_auth: []
      responses:
        '200':
          description: customer deleted
        '404':
          description: customer not found
        '401':
          description: unauthorized
  "/api/v1/merchants":
    post:
      summary: Create a merchant
      tags:
      - Merchants
      parameters: []
      responses:
        '201':
          description: merchant created
        '422':
          description: validation failed
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Acme Store
                email:
                  type: string
                  example: store@acme.com
                country:
                  type: string
                  example: JP
                  description: ISO 3166-1 alpha-2 country code
                currency:
                  type: string
                  example: JPY
                  description: ISO 4217 currency code
                webhook_url:
                  type: string
                  example: https://acme.com/webhooks
                  description: Optional URL to receive payment event notifications
              required:
              - name
              - email
              - country
              - currency
  "/api/v1/merchants/me":
    get:
      summary: Fetch own merchant profile
      tags:
      - Merchants
      security:
      - bearer_auth: []
      responses:
        '200':
          description: merchant found
        '401':
          description: unauthorized
    patch:
      summary: Update own merchant profile
      tags:
      - Merchants
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: merchant updated
        '422':
          description: validation failed
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                webhook_url:
                  type: string
                  example: https://acme.com/webhooks
  "/api/v1/payments":
    post:
      summary: Create a payment
      tags:
      - Payments
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: payment created
        '400':
          description: invalid currency
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  example: 1000
                  description: Amount in smallest currency unit (e.g. yen, cents)
                currency:
                  type: string
                  example: JPY
                  description: ISO 4217 currency code
                idempotency_key:
                  type: string
                  example: order_abc_123
                  description: Unique key to prevent duplicate payments
                customer_uid:
                  type: string
                  example: cus_abc123
                  description: UID of an existing customer to attach to this payment
              required:
              - amount
              - currency
              - idempotency_key
    get:
      summary: List payments
      tags:
      - Payments
      security:
      - bearer_auth: []
      parameters:
      - name: cursor
        in: query
        required: false
        description: Pagination cursor (uid of last payment in previous page)
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: Filter by status (pending, authorized, processing, succeeded,
          declined, cancelled, expired)
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Number of results per page (default: 25, max: 100)'
        schema:
          type: integer
      responses:
        '200':
          description: payments listed
        '401':
          description: unauthorized
  "/api/v1/payments/{uid}":
    parameters:
    - name: uid
      in: path
      description: Payment UID
      example: tr_abc123
      required: true
      schema:
        type: string
    get:
      summary: Fetch a payment
      tags:
      - Payments
      security:
      - bearer_auth: []
      responses:
        '200':
          description: payment found
        '404':
          description: payment not found
        '401':
          description: unauthorized
  "/api/v1/payments/{uid}/capture":
    parameters:
    - name: uid
      in: path
      description: Payment UID
      required: true
      schema:
        type: string
    post:
      summary: Capture a payment
      tags:
      - Payment Transitions
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: payment captured
        '422':
          description: invalid transition
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                captured_amount:
                  type: integer
                  example: 800
                  description: Amount to capture (defaults to full authorized amount)
  "/api/v1/payments/{uid}/cancel":
    parameters:
    - name: uid
      in: path
      description: Payment UID
      required: true
      schema:
        type: string
    post:
      summary: Cancel a payment
      tags:
      - Payment Transitions
      security:
      - bearer_auth: []
      responses:
        '200':
          description: payment cancelled
        '422':
          description: invalid transition
        '404':
          description: payment not found
        '401':
          description: unauthorized
  "/api/v1/payments/{uid}/webhook-events":
    parameters:
    - name: uid
      in: path
      description: Payment UID
      required: true
      schema:
        type: string
    get:
      summary: List webhook events for a payment
      tags:
      - Webhooks
      security:
      - bearer_auth: []
      responses:
        '200':
          description: webhook events listed
        '404':
          description: payment not found
        '401':
          description: unauthorized
  "/api/v1/payments/{payment_uid}/refunds":
    parameters:
    - name: payment_uid
      in: path
      description: Payment UID
      required: true
      schema:
        type: string
    post:
      summary: Create a refund
      tags:
      - Refunds
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: refund created
        '400':
          description: missing required parameters
        '422':
          description: refund amount exceeds refundable amount
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  example: 500
                  description: Amount to refund in smallest currency unit
                idempotency_key:
                  type: string
                  example: order_abc123_refund
                  description: Unique key to safely retry refund requests without
                    double-refunding
              required:
              - amount
              - idempotency_key
    get:
      summary: List refunds for a payment
      tags:
      - Refunds
      security:
      - bearer_auth: []
      responses:
        '200':
          description: refunds listed
        '404':
          description: payment not found
        '401':
          description: unauthorized
  "/api/v1/refunds":
    get:
      summary: List all refunds
      tags:
      - Refunds
      security:
      - bearer_auth: []
      parameters:
      - name: cursor
        in: query
        required: false
        description: Pagination cursor (uid of last refund in previous page)
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: Filter by status (pending, succeeded, failed)
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Number of results per page (default: 25, max: 100)'
        schema:
          type: integer
      responses:
        '200':
          description: refunds listed
          content:
            application/json:
              schema:
                type: object
                required:
                - refunds
                properties:
                  refunds:
                    type: array
                    items:
                      type: object
                      required:
                      - uid
                      - amount
                      - status
                      - currency
                      - payment_uid
                      - created_at
                      properties:
                        uid:
                          type: string
                          example: re_abc123
                        amount:
                          type: integer
                          example: 500
                        status:
                          type: string
                          enum:
                          - pending
                          - succeeded
                          - failed
                        currency:
                          type: string
                          example: JPY
                        payment_uid:
                          type: string
                          example: py_abc123
                        created_at:
                          type: string
                          format: date-time
                  next_cursor:
                    type: string
                    nullable: true
        '401':
          description: unauthorized
  "/api/v1/webhooks":
    get:
      summary: List webhook events
      tags:
      - Webhooks
      security:
      - bearer_auth: []
      responses:
        '200':
          description: webhook events listed
        '401':
          description: unauthorized
  "/api/v1/webhooks/ping":
    post:
      summary: Fire a test ping webhook
      tags:
      - Webhooks
      security:
      - bearer_auth: []
      responses:
        '200':
          description: ping enqueued
        '401':
          description: unauthorized
  "/api/v1/webhooks/{merchant_uid}":
    parameters:
    - name: merchant_uid
      in: path
      description: Merchant UID
      required: true
      schema:
        type: string
    post:
      summary: Receive a signed webhook event
      tags:
      - Webhooks
      parameters:
      - name: X-LensPay-Signature
        in: header
        required: false
        description: 'HMAC-SHA256 signature: sha256=<hex digest of raw body using
          webhook_secret>'
        schema:
          type: string
      responses:
        '200':
          description: event stored
        '401':
          description: invalid signature
        '404':
          description: merchant not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  example: payment.succeeded
                data:
                  type: object
              required:
              - type
servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
security:
- bearer_auth: []
