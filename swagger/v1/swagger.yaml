---
openapi: 3.0.1
info:
  title: LensPay API
  version: v1
  description: |
    Payment processing API for LensPay. Covers merchant onboarding, customers,
    the full payment lifecycle (authorize, capture, cancel, expire), refunds,
    disputes, and signed webhook delivery.

    ## Authentication
    All endpoints except merchant registration, demo sessions, and webhook sinks
    require `Authorization: Bearer <api_key>`. API keys are shown once at
    registration and stored only as a SHA256 digest.

    ## Amounts
    All amounts are integers in the smallest currency unit (yen for JPY, cents
    for USD). Currencies are ISO 4217 codes.

    ## Idempotency
    Payment and refund creation require an `idempotency_key`. Retrying a request
    with the same key returns the original resource instead of creating a
    duplicate, so network timeouts never double-charge.

    ## Pagination
    List endpoints use cursor pagination. Pass the `next_cursor` from a response
    as the `cursor` query param to fetch the next page. A null `next_cursor`
    means there are no further pages.

    ## Rate limiting
    Requests are throttled per IP (300 per 5 minutes), per API key (300 per
    5 minutes), and per IP for merchant registration (10 per hour). Exceeding a
    limit returns `429 Too Many Requests`; retry after the window passes.

    ## Webhooks
    State transitions POST a signed JSON event to the merchant's `webhook_url`.
    The `X-LensPay-Signature` header carries `sha256=<hex>`, an HMAC-SHA256 of
    the raw request body using the merchant's `webhook_secret`. Verify with a
    constant-time comparison.
paths:
  "/api/v1/customers":
    post:
      summary: Create a customer
      tags:
      - Customers
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: customer created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/customer"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/validation_errors"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  example: jane@example.com
                metadata:
                  type: object
                  example:
                    tier: gold
                  description: Arbitrary key-value data
              required:
              - name
              - email
    get:
      summary: List customers
      tags:
      - Customers
      security:
      - bearer_auth: []
      parameters:
      - name: cursor
        in: query
        required: false
        description: Pagination cursor (uid of last customer in previous page)
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Number of results per page (default: 25)'
        schema:
          type: integer
      responses:
        '200':
          description: customers listed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/customer_list"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/customers/{uid}":
    parameters:
    - name: uid
      in: path
      description: Customer UID
      example: cus_abc123
      required: true
      schema:
        type: string
    get:
      summary: Fetch a customer
      tags:
      - Customers
      security:
      - bearer_auth: []
      responses:
        '200':
          description: customer found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/customer"
        '404':
          description: customer not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    patch:
      summary: Update a customer
      tags:
      - Customers
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: customer updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/customer"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/validation_errors"
        '404':
          description: customer not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Jane Smith
                email:
                  type: string
                  example: jane.smith@example.com
                metadata:
                  type: object
                  example:
                    tier: platinum
    delete:
      summary: Delete a customer
      tags:
      - Customers
      security:
      - bearer_auth: []
      responses:
        '200':
          description: customer deleted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/customer"
        '404':
          description: customer not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/disputes":
    get:
      summary: List disputes
      tags:
      - Disputes
      security:
      - bearer_auth: []
      parameters:
      - name: cursor
        in: query
        required: false
        description: Pagination cursor
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: Filter by status (open, merchant_responded, won, lost)
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Results per page (default: 25, max: 100)'
        schema:
          type: integer
      responses:
        '200':
          description: disputes listed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/dispute_list"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/disputes/{uid}":
    parameters:
    - name: uid
      in: path
      description: Dispute UID
      required: true
      schema:
        type: string
    get:
      summary: Fetch a dispute
      tags:
      - Disputes
      security:
      - bearer_auth: []
      responses:
        '200':
          description: dispute found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/dispute"
        '404':
          description: dispute not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/disputes/{uid}/respond":
    parameters:
    - name: uid
      in: path
      description: Dispute UID
      required: true
      schema:
        type: string
    patch:
      summary: Submit evidence for a dispute
      tags:
      - Disputes
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: evidence submitted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/dispute_response"
        '422':
          description: invalid submission
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                evidence:
                  type: object
                  description: Free-form key-value evidence (tracking numbers, order
                    confirmations, etc.)
                  example:
                    tracking_number: 1Z999AA
                    order_date: '2026-01-01'
              required:
              - evidence
  "/api/v1/webhooks/network/disputes":
    post:
      summary: Open a dispute (card network)
      tags:
      - Network
      parameters:
      - name: X-Network-Secret
        in: header
        required: true
        description: Shared secret authenticating the card network
        schema:
          type: string
      responses:
        '201':
          description: dispute opened
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/dispute"
        '401':
          description: invalid network secret
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: invalid dispute
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_uid:
                  type: string
                  example: tr_abc123
                reason:
                  type: string
                  enum:
                  - fraudulent
                  - unrecognized
                  - duplicate
                  - product_not_received
                  - product_unacceptable
                amount:
                  type: integer
                  example: 5000
                currency:
                  type: string
                  example: JPY
              required:
              - payment_uid
              - reason
              - amount
              - currency
  "/api/v1/webhooks/network/disputes/{uid}/resolve":
    parameters:
    - name: uid
      in: path
      description: Dispute UID
      required: true
      schema:
        type: string
    post:
      summary: Resolve a dispute (card network)
      tags:
      - Network
      parameters:
      - name: X-Network-Secret
        in: header
        required: true
        description: Shared secret authenticating the card network
        schema:
          type: string
      responses:
        '200':
          description: dispute resolved
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/dispute"
        '401':
          description: invalid network secret
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: already resolved
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                outcome:
                  type: string
                  enum:
                  - won
                  - lost
                  example: won
              required:
              - outcome
  "/api/v1/merchants":
    post:
      summary: Create a merchant
      tags:
      - Merchants
      parameters: []
      responses:
        '201':
          description: merchant created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/merchant_credentials"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/validation_errors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Acme Store
                email:
                  type: string
                  example: store@acme.com
                country:
                  type: string
                  example: JP
                  description: ISO 3166-1 alpha-2 country code
                currency:
                  type: string
                  example: JPY
                  description: ISO 4217 currency code
                webhook_url:
                  type: string
                  example: https://acme.com/webhooks
                  description: Optional URL to receive payment event notifications
              required:
              - name
              - email
              - country
              - currency
  "/api/v1/merchants/me":
    get:
      summary: Fetch own merchant profile
      tags:
      - Merchants
      security:
      - bearer_auth: []
      responses:
        '200':
          description: merchant found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/merchant"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    patch:
      summary: Update own merchant profile
      tags:
      - Merchants
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: merchant updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/merchant"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/validation_errors"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                webhook_url:
                  type: string
                  example: https://acme.com/webhooks
  "/api/v1/payments":
    post:
      summary: Create a payment
      tags:
      - Payments
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: payment created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/payment"
        '400':
          description: invalid currency
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  example: 1000
                  description: Amount in smallest currency unit (e.g. yen, cents)
                currency:
                  type: string
                  example: JPY
                  description: ISO 4217 currency code
                idempotency_key:
                  type: string
                  example: order_abc_123
                  description: Unique key to prevent duplicate payments
                customer_uid:
                  type: string
                  example: cus_abc123
                  description: UID of an existing customer to attach to this payment
              required:
              - amount
              - currency
              - idempotency_key
    get:
      summary: List payments
      tags:
      - Payments
      security:
      - bearer_auth: []
      parameters:
      - name: cursor
        in: query
        required: false
        description: Pagination cursor (uid of last payment in previous page)
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: Filter by status (pending, authorized, processing, succeeded,
          declined, cancelled, expired)
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Number of results per page (default: 25, max: 100)'
        schema:
          type: integer
      responses:
        '200':
          description: payments listed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/payment_list"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '429':
          description: rate limit exceeded (300 requests per 5 minutes per API key
            or IP)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/payments/{uid}":
    parameters:
    - name: uid
      in: path
      description: Payment UID
      example: tr_abc123
      required: true
      schema:
        type: string
    get:
      summary: Fetch a payment
      tags:
      - Payments
      security:
      - bearer_auth: []
      responses:
        '200':
          description: payment found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/payment"
        '404':
          description: payment not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/payments/{uid}/capture":
    parameters:
    - name: uid
      in: path
      description: Payment UID
      required: true
      schema:
        type: string
    post:
      summary: Capture a payment
      tags:
      - Payment Transitions
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: payment captured
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/payment"
        '422':
          description: invalid transition
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                captured_amount:
                  type: integer
                  example: 800
                  description: Amount to capture (defaults to full authorized amount)
  "/api/v1/payments/{uid}/cancel":
    parameters:
    - name: uid
      in: path
      description: Payment UID
      required: true
      schema:
        type: string
    post:
      summary: Cancel a payment
      tags:
      - Payment Transitions
      security:
      - bearer_auth: []
      responses:
        '200':
          description: payment cancelled
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/payment"
        '422':
          description: invalid transition
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '404':
          description: payment not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/payments/{uid}/webhook-events":
    parameters:
    - name: uid
      in: path
      description: Payment UID
      required: true
      schema:
        type: string
    get:
      summary: List webhook events for a payment
      tags:
      - Webhooks
      security:
      - bearer_auth: []
      responses:
        '200':
          description: webhook events listed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/webhook_event_list"
        '404':
          description: payment not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/payments/{payment_uid}/refunds":
    parameters:
    - name: payment_uid
      in: path
      description: Payment UID
      required: true
      schema:
        type: string
    post:
      summary: Create a refund
      tags:
      - Refunds
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: refund created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/refund"
        '400':
          description: missing required parameters
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: refund amount exceeds refundable amount
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  example: 500
                  description: Amount to refund in smallest currency unit
                idempotency_key:
                  type: string
                  example: order_abc123_refund
                  description: Unique key to safely retry refund requests without
                    double-refunding
              required:
              - amount
              - idempotency_key
    get:
      summary: List refunds for a payment
      tags:
      - Refunds
      security:
      - bearer_auth: []
      responses:
        '200':
          description: refunds listed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/refund_list"
        '404':
          description: payment not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/refunds":
    get:
      summary: List all refunds
      tags:
      - Refunds
      security:
      - bearer_auth: []
      parameters:
      - name: cursor
        in: query
        required: false
        description: Pagination cursor (uid of last refund in previous page)
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: Filter by status (pending, succeeded, failed)
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Number of results per page (default: 25, max: 100)'
        schema:
          type: integer
      responses:
        '200':
          description: refunds listed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/refund_list"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/webhooks":
    get:
      summary: List webhook events
      tags:
      - Webhooks
      security:
      - bearer_auth: []
      parameters:
      - name: cursor
        in: query
        required: false
        description: Pagination cursor (id of last event in previous page)
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: 'Number of results per page (default: 25)'
        schema:
          type: integer
      responses:
        '200':
          description: webhook events listed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/webhook_event_list"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/webhooks/ping":
    post:
      summary: Fire a test ping webhook
      tags:
      - Webhooks
      security:
      - bearer_auth: []
      responses:
        '200':
          description: ping enqueued
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/webhooks/{merchant_uid}":
    parameters:
    - name: merchant_uid
      in: path
      description: Merchant UID
      required: true
      schema:
        type: string
    post:
      summary: Receive a signed webhook event
      tags:
      - Webhooks
      parameters:
      - name: X-LensPay-Signature
        in: header
        required: false
        description: 'HMAC-SHA256 signature: sha256=<hex digest of raw body using
          webhook_secret>'
        schema:
          type: string
      responses:
        '200':
          description: event stored
        '401':
          description: invalid signature
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '404':
          description: merchant not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '400':
          description: malformed JSON body
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  example: payment.succeeded
                data:
                  type: object
              required:
              - type
servers:
- url: "/"
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
  schemas:
    error:
      type: object
      properties:
        error:
          type: string
          example: Payment not found
      required:
      - error
    validation_errors:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
          example:
          - Amount must be greater than 0
      required:
      - errors
    payment_customer:
      type: object
      nullable: true
      description: Customer details snapshotted at payment creation
      properties:
        uid:
          type: string
          nullable: true
          example: cus_abc123
        name:
          type: string
          example: Alice Johnson
        email:
          type: string
          example: alice@example.com
    dispute_summary:
      type: object
      nullable: true
      description: Active dispute attached to the payment, if any
      properties:
        uid:
          type: string
          example: dis_abc123
        status:
          type: string
          enum:
          - open
          - merchant_responded
          - won
          - lost
        reason:
          type: string
          enum:
          - fraudulent
          - unrecognized
          - duplicate
          - product_not_received
          - product_unacceptable
        amount:
          type: integer
          example: 1000
        currency:
          type: string
          example: JPY
        respond_by:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
    payment:
      type: object
      properties:
        uid:
          type: string
          example: tr_abc123
        amount:
          type: integer
          description: Amount in smallest currency unit
          example: 1000
        currency:
          type: string
          description: ISO 4217 code
          example: JPY
        status:
          type: string
          enum:
          - pending
          - authorized
          - processing
          - succeeded
          - declined
          - cancelled
          - expired
        captured_amount:
          type: integer
          nullable: true
          description: Set on capture; may be less than amount
        idempotency_key:
          type: string
          example: order_abc_123
        customer_name:
          type: string
          nullable: true
          description: Snapshot taken at creation
        customer_email:
          type: string
          nullable: true
          description: Snapshot taken at creation
        provider_reference:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
